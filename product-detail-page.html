<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - KCP Organics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="product-detail.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            padding-top: 85px;
            background: #f9f9f9;
        }

        .navbar-cart {
            cursor: pointer;
            position: relative;
            font-size: 24px;
            color: #dd610e;
            transition: all 0.3s;
        }

        .navbar-cart:hover {
            color: #2e7d32;
            transform: scale(1.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .product-detail-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            margin-top: 20px;
        }

        .product-detail-header {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }

        /* Responsive product detail */
        @media (max-width: 768px) {
            .product-detail-container {
                padding: 25px 15px;
                margin-top: 10px;
            }

            .product-detail-header {
                grid-template-columns: 1fr;
                gap: 25px;
            }

            .product-main-image {
                width: 100%;
                height: auto;
                max-height: 350px;
                object-fit: cover;
            }

            .product-info-section h1 {
                font-size: 24px;
            }

            .units-grid {
                display: grid !important;
                grid-template-columns: repeat(2, 1fr) !important;
                gap: 10px !important;
            }

            .unit-option {
                padding: 10px 8px !important;
                font-size: 13px !important;
            }
        }

        @media (max-width: 480px) {
            .product-detail-container {
                padding: 20px 12px;
            }

            .product-detail-header {
                gap: 15px;
            }

            .product-info-section h1 {
                font-size: 20px;
            }

            .product-rating-section {
                flex-wrap: wrap;
            }

            .units-grid {
                grid-template-columns: 1fr !important;
            }

            .unit-option {
                padding: 12px 10px !important;
                font-size: 12px !important;
            }

            .quantity-input {
                max-width: 100px;
            }

            .add-to-cart-btn {
                padding: 12px 16px;
                font-size: 14px;
            }

            .review-form {
                padding: 15px !important;
            }

            .reviews-list {
                grid-template-columns: 1fr !important;
            }
        }

        @media (max-width: 360px) {
            .product-detail-container {
                padding: 15px 10px;
                border-radius: 8px;
            }

            .product-info-section h1 {
                font-size: 18px;
            }

            .units-grid {
                grid-template-columns: 1fr !important;
            }

            .add-to-cart-btn {
                padding: 10px 12px;
                font-size: 13px;
            }
        }

        .product-image-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .product-main-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 12px;
            background: #f5f5f5;
        }

        .product-info-section h1 {
            font-size: 28px;
            color: #1B5E20;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .product-rating-section {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stars-large {
            font-size: 18px;
            color: #ffc107;
        }

        .rating-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .rating-info p {
            margin: 0;
            color: #666;
            font-size: 14px;
        }

        .price-section {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 12px;
        }

        .original-price {
            font-size: 18px;
            color: #999;
            text-decoration: line-through;
        }

        .sale-price {
            font-size: 32px;
            font-weight: 700;
            color: #dd610e;
        }

        .stock-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding: 12px 16px;
            border-radius: 8px;
            font-weight: 600;
        }

        .stock-info.in-stock {
            background: #d4edda;
            color: #155724;
        }

        .stock-info.low-stock {
            background: #fff3cd;
            color: #856404;
        }

        .stock-info.out-of-stock {
            background: #f8d7da;
            color: #721c24;
        }

        .units-section {
            margin-bottom: 20px;
        }

        .units-section label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
        }

        .units-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
        }

        .unit-option {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-weight: 600;
        }

        .unit-option:hover {
            border-color: #dd610e;
        }

        .unit-option.selected {
            background: #dd610e;
            color: white;
            border-color: #dd610e;
        }

        .quantity-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .quantity-section label {
            color: #333;
            font-weight: 600;
            min-width: 80px;
        }

        .quantity-input {
            width: 80px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .add-to-cart-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #dd610e 0%, #c85a0a 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .add-to-cart-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(221, 97, 14, 0.5);
        }

        .add-to-cart-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .product-description-section {
            margin-bottom: 40px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 12px;
        }

        .product-description-section h3 {
            color: #dd610e;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .product-description-section p {
            color: #666;
            line-height: 1.8;
            margin: 0;
        }

        .reviews-section {
            margin-top: 40px;
        }

        .reviews-section h2 {
            color: #dd610e;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .review-form {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .rating-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .star-rating {
            font-size: 28px;
            color: #ddd;
            cursor: pointer;
            transition: color 0.2s;
        }

        .star-rating:hover,
        .star-rating.active {
            color: #ffc107;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .submit-btn {
            background: #2e7d32;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            background: #1b5e20;
            transform: translateY(-2px);
        }

        .reviews-list {
            display: grid;
            gap: 15px;
        }

        .review-item {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #dd610e;
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .reviewer-info {
            font-weight: 600;
            color: #333;
        }

        .review-rating {
            color: #ffc107;
            font-size: 14px;
        }

        .review-date {
            color: #999;
            font-size: 12px;
        }

        .review-title {
            font-weight: 600;
            color: #1B5E20;
            margin-bottom: 8px;
        }

        .review-comment {
            color: #666;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .product-detail-header {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .product-main-image {
                height: 300px;
            }

            .product-info-section h1 {
                font-size: 20px;
            }

            .sale-price {
                font-size: 24px;
            }

            .units-grid {
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            }
        }
    </style>
</head>

    <!-- Back Button -->

    <script>
        // Smart base URL: works for file://, localhost, 127.0.0.1
        function getBaseUrl() {
            const hostname = window.location.hostname;
            const port = window.location.port;
            
            // For localhost or 127.0.0.1, use local backend
            if (hostname === 'localhost' || hostname === '127.0.0.1' || hostname.startsWith('192.168.')) {
                return port ? `http://${hostname}:5000` : 'http://localhost:5000';
            }
            
            // For deployed environments, use production URL
            if (hostname.includes('render') || hostname.includes('herokuapp') || hostname.includes('.app')) {
                return 'https://kcp-organics-1.onrender.com';
            }
            
            // For custom domains, try to construct the backend URL
            if (hostname.includes('kcporganics') || hostname.includes('kcp-organics')) {
                const protocol = window.location.protocol;
                return `${protocol}//${hostname}:5000`;
            }
            
            // Default fallback
            return 'https://kcp-organics-1.onrender.com';
        }
        const API_BASE_URL = getBaseUrl() + '/api';
        const IMAGE_BASE_URL = getBaseUrl();
        const triedImageUrls = new Set();
        let currentProductId = null;
        let selectedUnit = null;
        let currentProduct = null;

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            currentProductId = params.get('id');

            if (currentProductId) {
                loadProductDetail();
                loadProductReviews();
                checkUserLogin();
                updateCartBadge();
            } else {
                window.location.href = 'products.html';
            }
        });

        function loadProductDetail() {
            fetch(`${API_BASE_URL}/products/${currentProductId}`)
                .then(res => {
                    if (!res.ok) {
                        throw new Error(`HTTP error! status: ${res.status}`);
                    }
                    return res.json();
                })
                .then(data => {
                    if (data.success) {
                        const product = data.data;
                        displayProductDetail(product);
                    } else {
                        console.error('Product load error:', data.message);
                        showToast('❌ Error loading product');
                    }
                })
                .catch(err => {
                    console.error('Error loading product:', err);
                    showToast('❌ Error loading product: ' + err.message);
                });
        }

        function displayProductDetail(product) {
            currentProduct = product; // Store product data globally
            document.getElementById('productName').textContent = product.name;
            
            // Set up image with error handling
            const mainImg = document.getElementById('mainImage');
            const imageUrl = getProductImageUrl(product.image);
            console.log('📸 Loading product image:', {
                productImage: product.image,
                constructedUrl: imageUrl,
                baseUrl: IMAGE_BASE_URL
            });
            
            // Add error handler for image loading
            mainImg.onerror = () => {
                handleImageError(mainImg, product.image);
            };
            
            mainImg.src = imageUrl;
            mainImg.alt = product.name;
            document.getElementById('productDescription').textContent = product.description;
            document.getElementById('productStars').textContent = generateStars(product.averageRating);
            document.getElementById('ratingCount').textContent = `${product.averageRating || 0} out of 5`;
            document.getElementById('totalReviews').textContent = `${product.totalReviews || 0} reviews`;

            // Price
            const salePrice = product.price || 0;
            const originalPrice = product.originalPrice || product.price || 0;
            document.getElementById('salePrice').textContent = `₹${salePrice.toFixed(2)}`;
            
            if (originalPrice > salePrice) {
                document.getElementById('originalPrice').style.display = 'inline';
                document.getElementById('originalPrice').textContent = `₹${originalPrice.toFixed(2)}`;
            }

            // Stock
            const stockInfo = document.getElementById('stockInfo');
            if (product.stock > 0) {
                if (product.stock <= 10) {
                    stockInfo.className = 'stock-info low-stock';
                    stockInfo.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Only ${product.stock} left in stock`;
                } else {
                    stockInfo.className = 'stock-info in-stock';
                    stockInfo.innerHTML = `<i class="fas fa-check-circle"></i> In Stock (${product.stock} available)`;
                }
                document.getElementById('addToCartBtn').disabled = false;
            } else {
                stockInfo.className = 'stock-info out-of-stock';
                stockInfo.innerHTML = `<i class="fas fa-times-circle"></i> Out of Stock`;
                document.getElementById('addToCartBtn').disabled = true;
            }

            // Units
            if (product.units && product.units.length > 0) {
                const unitsSection = document.getElementById('unitsSection');
                const unitsGrid = document.getElementById('unitsGrid');
                unitsSection.style.display = 'block';
                unitsGrid.innerHTML = '';

                product.units.forEach((unit, idx) => {
                    const unitLabel = { 'kg': 'kg', 'litre': 'L', 'ml': 'ml', 'g': 'g', 'piece': 'pcs' };
                    const unitBtn = document.createElement('button');
                    unitBtn.className = 'unit-option';
                    unitBtn.textContent = `${unit.quantity}${unitLabel[unit.unit]} - ₹${unit.price}`;
                    unitBtn.onclick = () => selectUnit(idx, unit);
                    unitsGrid.appendChild(unitBtn);
                });
            }
        }

        function getProductImageUrl(imagePath) {
            // Inline SVG placeholder (avoids external network requests)
            const placeholder = 'data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22250%22 height=%22250%22><rect width=%22100%25%22 height=%22100%25%22 fill=%22%23f3f4f6%22/><text x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%23888888%22 font-family=%22Arial%22 font-size=%2218%22>Product+Image</text></svg>';

            if (!imagePath || imagePath.trim() === '') {
                console.warn('⚠️ Image path is empty, using placeholder');
                return placeholder;
            }

            // Already a full URL
            if (imagePath.startsWith('http://') || imagePath.startsWith('https://')) {
                console.log('📸 Using full URL:', imagePath);
                return imagePath;
            }

            // If path already includes uploads (with or without leading slash), normalize it and prefix IMAGE_BASE_URL
            if (imagePath.includes('/uploads/')) {
                const normalized = imagePath.startsWith('/') ? imagePath : `/${imagePath}`;
                const fullUrl = IMAGE_BASE_URL + normalized;
                console.log('📸 Image URL (with /uploads/):', fullUrl);
                return fullUrl;
            }

            // If the imagePath looks like a filename (e.g., product.jpg), place it under /uploads/products/ and prefix IMAGE_BASE_URL
            const rel = `/uploads/products/${imagePath}`;
            const fullUrl = IMAGE_BASE_URL + rel;
            console.log('📸 Image URL (filename):', fullUrl);
            return fullUrl;
        }

        // Function to handle image load errors with fallback URLs
        function handleImageError(imgElement, imagePath) {
            console.warn('❌ Image failed to load:', imgElement.src);
            
            const originalPath = imagePath;
            const genericPlaceholder = 'data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22250%22 height=%22250%22><rect width=%22100%25%22 height=%22100%25%22 fill=%22%23e0e0e0%22/><text x=%2250%25%22 y=%2230%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%23666666%22 font-family=%22Arial%22 font-size=%2214%22 font-weight=%22bold%22>Image Not Available</text><text x=%2250%25%22 y=%2270%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%23999999%22 font-family=%22Arial%22 font-size=%2212%22>' + encodeURIComponent(imagePath || 'Unknown') + '</text></svg>';
            
            // Try fallback to production URL if we're on localhost
            if (IMAGE_BASE_URL.includes('localhost') || IMAGE_BASE_URL.includes('127.0.0.1')) {
                const prodUrl = 'https://kcp-organics-1.onrender.com' + (imagePath.startsWith('/') ? imagePath : `/uploads/products/${imagePath}`);
                if (!triedImageUrls.has(prodUrl)) {
                    console.log('🔄 Trying production URL:', prodUrl);
                    triedImageUrls.add(prodUrl);
                    imgElement.src = prodUrl;
                    imgElement.onerror = function() { tryFrontendImageFallback(this, imagePath); };
                    return;
                }
            }

            // Try fallback to frontend image
            tryFrontendImageFallback(imgElement, imagePath);
        }

        // Try loading image from frontend root directory as fallback
        function tryFrontendImageFallback(imgElement, imagePath) {
            // Extract just the filename from path like "/uploads/products/rice-123-456.png" or "rice.png"
            let filename = imagePath;
            if (imagePath.includes('/')) {
                filename = imagePath.split('/').pop();
            }
            
            // Extract base filename without timestamp (e.g., "coconut_oil-1775486953994-547912330.webp" → "coconut_oil.webp")
            let baseFilename = filename;
            const timestampPattern = /-\d{13}-\d{9}\./;
            if (timestampPattern.test(filename)) {
                baseFilename = filename.replace(timestampPattern, '.');
                console.log('🔍 Extracted base filename:', baseFilename, 'from:', filename);
            }
            
            // Try with base filename first (without timestamp)
            const frontendUrl = './' + baseFilename;
            if (!triedImageUrls.has(frontendUrl)) {
                console.log('🔄 Trying frontend image (base):', frontendUrl);
                triedImageUrls.add(frontendUrl);
                imgElement.src = frontendUrl;
                imgElement.onerror = function() { 
                    // If base filename fails, try the full filename with timestamp
                    tryFullFilenameVariant(this, filename, baseFilename);
                };
                return;
            }

            // Use placeholder as last resort
            usePlaceholder(imgElement);
        }

        // Try the full filename with timestamp as last frontend attempt
        function tryFullFilenameVariant(imgElement, fullFilename, baseFilename) {
            const frontendUrl = './' + fullFilename;
            if (!triedImageUrls.has(frontendUrl)) {
                console.log('🔄 Trying frontend image (full):', frontendUrl);
                triedImageUrls.add(frontendUrl);
                imgElement.src = frontendUrl;
                imgElement.onerror = function() { usePlaceholder(this); };
                return;
            }
            
            // Use placeholder as last resort
            usePlaceholder(imgElement);
        }

        // Use placeholder image
        function usePlaceholder(imgElement) {
            const genericPlaceholder = 'data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22250%22 height=%22250%22><rect width=%22100%25%22 height=%22100%25%22 fill=%22%23e0e0e0%22/><text x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%23666666%22 font-family=%22Arial%22 font-size=%2214%22 font-weight=%22bold%22>Image Not Available</text></svg>';
            console.log('📷 Using placeholder');
            imgElement.src = genericPlaceholder;
            imgElement.style.backgroundColor = '#f0f0f0';
        }

        function generateStars(rating) {
            rating = rating || 0;
            const fullStars = Math.floor(rating);
            const hasHalf = rating % 1 >= 0.5;
            let stars = '★'.repeat(fullStars);
            if (hasHalf) stars += '⯨';
            stars += '☆'.repeat(5 - fullStars - (hasHalf ? 1 : 0));
            return stars;
        }

        function selectUnit(idx, unit) {
            selectedUnit = unit;
            document.querySelectorAll('.unit-option').forEach((btn, i) => {
                btn.classList.toggle('selected', i === idx);
            });
        }

        function addToCart() {
            if (!currentProduct) {
                showToast('❌ Product data not loaded');
                return;
            }

            const userId = localStorage.getItem('userId') || 'guest';
            const quantity = parseInt(document.getElementById('quantity').value) || 1;

            // Determine price based on unit selection
            let price = currentProduct.price;
            if (selectedUnit && selectedUnit.price) {
                price = selectedUnit.price;
            }

            const cartItem = {
                cartItemId: 'ci_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
                userId: userId,
                productId: currentProductId,
                name: currentProduct.name,
                image: currentProduct.image, // Store just the relative path, not full URL
                price: price,
                quantity: quantity,
                unit: selectedUnit ? `${selectedUnit.quantity}${selectedUnit.unit}` : null,
                unitDetails: selectedUnit || null,
                variants: {}
            };

            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const existingItem = cart.find(item => item.productId === currentProductId && item.unit === cartItem.unit);

            if (existingItem) {
                existingItem.quantity += quantity;
            } else {
                cart.push(cartItem);
            }

            localStorage.setItem('cart', JSON.stringify(cart));
            showToast('✅ Added to cart!');
            updateCartBadge();
        }

        function setStar(rating) {
            document.getElementById('selectedRating').value = rating;
            document.querySelectorAll('.star-rating').forEach((star, idx) => {
                star.classList.toggle('active', idx < rating);
            });
        }

        function submitReview() {
            const rating = parseInt(document.getElementById('selectedRating').value);
            const title = document.getElementById('reviewTitle').value.trim();
            const comment = document.getElementById('reviewComment').value.trim();

            const userId = localStorage.getItem('userId');
            const userName = localStorage.getItem('userName');

            if (!userId || !userName) {
                showToast('⚠️ Please login to submit a review');
                return;
            }

            fetch(`${API_BASE_URL}/reviews`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    productId: currentProductId,
                    userId: userId,
                    rating: rating || 0,
                    title: title || '',
                    comment: comment || '',
                    reviewerName: userName
                })
            })
            .then(res => {
                if (!res.ok) {
                    throw new Error(`HTTP error! status: ${res.status}`);
                }
                return res.json();
            })
            .then(data => {
                if (data.success) {
                    showToast('✅ Review submitted successfully!');
                    document.getElementById('reviewTitle').value = '';
                    document.getElementById('reviewComment').value = '';
                    document.getElementById('selectedRating').value = '0';
                    document.querySelectorAll('.star-rating').forEach(s => s.classList.remove('active'));
                    loadProductReviews();
                } else {
                    showToast('❌ ' + (data.message || 'Error submitting review'));
                }
            })
            .catch(error => {
                console.error('Review submission error:', error);
                showToast('❌ Error submitting review: ' + error.message);
            });
        }

        function loadProductReviews() {
            fetch(`${API_BASE_URL}/reviews/product/${currentProductId}`)
                .then(res => {
                    if (!res.ok) {
                        throw new Error(`HTTP error! status: ${res.status}`);
                    }
                    return res.json();
                })
                .then(data => {
                    if (data.success) {
                        displayReviews(data.data || []);
                    } else {
                        console.error('Review load error:', data.message);
                    }
                })
                .catch(err => {
                    console.error('Error loading reviews:', err);
                    document.getElementById('reviewsList').innerHTML = '<p style="text-align: center; color: red;">Error loading reviews</p>';
                });
        }

        function displayReviews(reviews) {
            const reviewsList = document.getElementById('reviewsList');
            
            if (reviews.length === 0) {
                reviewsList.innerHTML = '<p style="text-align: center; color: #999;">No reviews yet. Be the first to review!</p>';
                return;
            }

            reviewsList.innerHTML = reviews.map(review => `
                <div class="review-item">
                    <div class="review-header">
                        <div>
                            <div class="reviewer-info">${review.reviewerName || 'Anonymous'}</div>
                            <div class="review-rating">${generateStars(review.rating)}</div>
                        </div>
                        <div class="review-date">${new Date(review.createdAt).toLocaleDateString()}</div>
                    </div>
                    ${review.title ? `<div class="review-title">${review.title}</div>` : ''}
                    ${review.comment ? `<div class="review-comment">${review.comment}</div>` : ''}
                </div>
            `).join('');
        }

        function checkUserLogin() {
            const userName = localStorage.getItem('userName');
            if (userName) {
                document.getElementById('loginLink').style.display = 'none';
                document.getElementById('signupLink').style.display = 'none';
                document.getElementById('userDropdown').style.display = 'block';
                document.getElementById('userName').textContent = 'Welcome, ' + userName;
                document.getElementById('reviewForm').style.display = 'block';
            } else {
                document.getElementById('loginLink').style.display = 'inline';
                document.getElementById('signupLink').style.display = 'inline';
                document.getElementById('userDropdown').style.display = 'none';
                document.getElementById('reviewForm').style.display = 'block';
            }
        }

        // Open My Orders modal
        function openMyOrders(event) {
            event.preventDefault();
            const userId = localStorage.getItem('userId');
            const userName = localStorage.getItem('userName');
            
            if (!userId || !userName) {
                alert('Please login to view your orders');
                window.location.href = 'login.html';
                return;
            }

            // Create modal for orders
            const modal = document.createElement('div');
            modal.className = 'orders-modal';
            modal.innerHTML = `
                <div class="orders-modal-content">
                    <div class="orders-modal-header">
                        <h2>My Orders</h2>
                        <button onclick="this.closest('.orders-modal').remove()" class="close-btn">&times;</button>
                    </div>
                    <div class="orders-modal-body" id="ordersContainer">
                        <div style="text-align: center; padding: 40px;">
                            <i class="fas fa-spinner fa-spin" style="font-size: 32px; color: #dd610e;"></i>
                            <p style="margin-top: 10px;">Loading your orders...</p>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // Fetch user orders
            const API_BASE_URL = window.location.hostname === 'localhost' ? 'http://localhost:5000/api' : 'https://kcp-organics-1.onrender.com/api';
            fetch(`${API_BASE_URL}/orders/user/${userId}`)
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('ordersContainer');
                    if (data.success && data.data && data.data.length > 0) {
                        container.innerHTML = data.data.map(order => `
                            <div class="order-card">
                                <div class="order-header">
                                    <span class="order-id"><strong>Order #${order._id.substring(0, 8).toUpperCase()}</strong></span>
                                    <span class="order-date">${new Date(order.createdAt).toLocaleDateString('en-IN')}</span>
                                </div>
                                <div class="order-items">
                                    ${order.products.map(item => `
                                        <div class="order-item">
                                            <span class="item-name">${item.name} × ${item.quantity}</span>
                                            <span class="item-price">₹${(item.price * item.quantity).toFixed(2)}</span>
                                        </div>
                                    `).join('')}
                                </div>
                                <div class="order-footer" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                                    <div>
                                        <span class="order-total"><strong>Total: ₹${order.totalAmount.toFixed(2)}</strong></span>
                                        <span class="order-status" style="background: ${order.orderStatus === 'delivered' ? '#27ae60' : order.orderStatus === 'pending' ? '#f39c12' : '#e74c3c'}; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; margin-left: 10px;">
                                            ${order.orderStatus || 'Pending'}
                                        </span>
                                    </div>
                                    <button onclick="downloadReceiptPDF('${order._id}')" style="background: #4CAF50; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500; transition: background 0.3s;" onmouseover="this.style.background='#2e7d32'" onmouseout="this.style.background='#4CAF50'">
                                        <i class="fas fa-download" style="margin-right: 5px;"></i>Download Receipt
                                    </button>
                                </div>
                            </div>
                        `).join('');
                    } else {
                        container.innerHTML = `
                            <div style="text-align: center; padding: 40px;">
                                <i class="fas fa-box-open" style="font-size: 48px; color: #ccc;"></i>
                                <p style="margin-top: 10px; color: #666;">No orders found. Start shopping!</p>
                            </div>
                        `;
                    }
                })
                .catch(error => {
                    console.error('Error loading orders:', error);
                    document.getElementById('ordersContainer').innerHTML = `
                        <div style="text-align: center; padding: 40px; color: #e74c3c;">
                            <i class="fas fa-exclamation-circle" style="font-size: 32px;"></i>
                            <p>Error loading orders: ${error.message}</p>
                        </div>
                    `;
                });
        }

        function updateCartBadge() {
            const all = JSON.parse(localStorage.getItem('cart') || '[]');
            const uid = localStorage.getItem('userId') || 'guest';
            const total = all.filter(i => (i.userId || 'guest') === uid).reduce((s, it) => s + (it.quantity || 0), 0);
            document.getElementById('cartBadge').textContent = total;
        }

        function toggleCart() {
            window.location.href = 'cart.html';
        }

        // Download Receipt as PDF
        async function downloadReceiptPDF(orderId) {
            const userId = localStorage.getItem('userId');
            const API_BASE_URL = window.location.hostname === 'localhost' ? 'http://localhost:5000/api' : 'https://kcp-organics-1.onrender.com/api';
            
            try {
                const response = await fetch(`${API_BASE_URL}/orders/${orderId}`);
                const data = await response.json();
                
                if (data.success) {
                    const order = data.data;
                    const PDFClass = window.jsPDF || (window.jspdf && window.jspdf.jsPDF);
                    if (!PDFClass) {
                        alert('PDF library not loaded. Please refresh the page.');
                        return;
                    }
                    
                    const doc = new PDFClass('p', 'mm', 'a4');
                    const pageWidth = doc.internal.pageSize.getWidth();
                    let y = 15;
                    
                    // Header
                    doc.setFontSize(18);
                    doc.setTextColor(46, 125, 50);
                    doc.setFont(undefined, 'bold');
                    doc.text('KCP ORGANICS', pageWidth / 2, y, { align: 'center' });
                    
                    y += 6;
                    doc.setFontSize(10);
                    doc.setTextColor(100, 100, 100);
                    doc.setFont(undefined, 'normal');
                    doc.text('100% Organic | Farm Fresh to Your Doorstep', pageWidth / 2, y, { align: 'center' });
                    
                    y += 4;
                    doc.setFontSize(9);
                    doc.text('Contact: +91 98765 43210 | Email: support@kcporganics.com', pageWidth / 2, y, { align: 'center' });
                    
                    // Horizontal line
                    y += 6;
                    doc.setDrawColor(46, 125, 50);
                    doc.setLineWidth(0.5);
                    doc.line(15, y, pageWidth - 15, y);
                    
                    // Invoice Details Section
                    y += 8;
                    doc.setFontSize(11);
                    doc.setTextColor(0, 0, 0);
                    doc.setFont(undefined, 'bold');
                    doc.text('INVOICE DETAILS', 15, y);
                    
                    y += 6;
                    doc.setFontSize(9);
                    doc.setFont(undefined, 'normal');
                    const orderIdFormatted = order._id.substring(0, 8).toUpperCase();
                    const tax = Math.round(order.totalAmount * 0.05 / 1.05);
                    const subtotal = order.totalAmount - tax;
                    
                    doc.text(`Order ID: ORD-${orderIdFormatted}-${new Date(order.createdAt).getTime().toString().slice(-6)}`, 15, y);
                    y += 5;
                    doc.text(`Date: ${new Date(order.createdAt).toLocaleDateString('en-IN')}`, 15, y);
                    y += 5;
                    doc.text(`Payment Method: ${order.paymentMethod || 'COD'}`, 15, y);
                    
                    // Bill To Section
                    y += 8;
                    doc.setFont(undefined, 'bold');
                    doc.setFontSize(10);
                    doc.text('BILL TO', 15, y);
                    
                    y += 5;
                    doc.setFont(undefined, 'normal');
                    doc.setFontSize(9);
                    doc.text(`${order.customerName || 'Valued Customer'}`, 15, y);
                    y += 4;
                    doc.text(`${order.address || 'Address on file'}`, 15, y);
                    y += 4;
                    doc.text(`${order.phone || order.email || ''}`, 15, y);
                    y += 4;
                    doc.text(`Email: ${order.email || ''}`, 15, y);
                    
                    // Items Table
                    y += 8;
                    const tableStartY = y;
                    const colWidths = {
                        sno: 12,
                        productId: 35,
                        productName: 70,
                        qty: 15,
                        unitPrice: 25,
                        total: 25
                    };
                    
                    const col1 = 15;
                    const col2 = col1 + colWidths.sno;
                    const col3 = col2 + colWidths.productId;
                    const col4 = col3 + colWidths.productName;
                    const col5 = col4 + colWidths.qty;
                    const col6 = col5 + colWidths.unitPrice;
                    
                    // Table header background
                    doc.setFillColor(46, 125, 50);
                    doc.rect(col1 - 2, y - 3, pageWidth - 30, 6, 'F');
                    
                    // Table headers
                    doc.setTextColor(255, 255, 255);
                    doc.setFont(undefined, 'bold');
                    doc.setFontSize(9);
                    doc.text('S.No', col1, y);
                    doc.text('Product ID', col2, y);
                    doc.text('Product Name', col3, y);
                    doc.text('Qty', col4 + 2, y);
                    doc.text('Unit Price', col5 + 2, y);
                    doc.text('Total', col6 + 5, y);
                    
                    y += 7;
                    doc.setTextColor(0, 0, 0);
                    doc.setFont(undefined, 'normal');
                    doc.setFontSize(8);
                    
                    // Table rows
                    order.products.forEach((item, index) => {
                        const itemTotal = (item.price * item.quantity).toFixed(2);
                        doc.text(`${index + 1}`, col1, y);
                        doc.text(item._id ? item._id.toString().substring(0, 8) : 'N/A', col2, y);
                        doc.text(item.name.substring(0, 45), col3, y);
                        doc.text(item.quantity.toString(), col4 + 2, y);
                        doc.text(`₹${item.price}`, col5 + 2, y);
                        doc.text(`₹${itemTotal}`, col6 + 5, y);
                        y += 5;
                        
                        if (y > 250) {
                            doc.addPage();
                            y = 15;
                        }
                    });
                    
                    // Totals Section
                    y += 3;
                    doc.setDrawColor(46, 125, 50);
                    doc.line(col1 - 2, y, pageWidth - 15, y);
                    
                    y += 6;
                    doc.setFont(undefined, 'normal');
                    doc.setFontSize(9);
                    doc.setTextColor(0, 0, 0);
                    
                    const subtotalAmount = subtotal.toFixed(2);
                    const taxAmount = tax.toFixed(2);
                    const totalAmount = order.totalAmount.toFixed(2);
                    
                    // Align right for amounts
                    const amountColX = pageWidth - 30;
                    const labelColX = col3;
                    
                    doc.text('Subtotal:', labelColX, y);
                    doc.text(`₹${subtotalAmount}`, amountColX, y, { align: 'right' });
                    
                    y += 4;
                    doc.text('Tax (5%):', labelColX, y);
                    doc.text(`₹${taxAmount}`, amountColX, y, { align: 'right' });
                    
                    y += 6;
                    doc.setFont(undefined, 'bold');
                    doc.setFontSize(10);
                    doc.setTextColor(46, 125, 50);
                    doc.text('Total Amount:', labelColX, y);
                    doc.text(`₹${totalAmount}`, amountColX, y, { align: 'right' });
                    
                    // Footer
                    y = doc.internal.pageSize.getHeight() - 25;
                    doc.setDrawColor(200, 200, 200);
                    doc.line(15, y, pageWidth - 15, y);
                    
                    y += 4;
                    doc.setFontSize(8);
                    doc.setTextColor(100, 100, 100);
                    doc.setFont(undefined, 'normal');
                    doc.text('Thank you for shopping with KCP Organics!', pageWidth / 2, y, { align: 'center' });
                    
                    y += 3;
                    doc.text(`You can track your order using Order ID and Mobile Number at www.kcporganics.com`, pageWidth / 2, y, { align: 'center' });
                    
                    y += 3;
                    doc.text('This is a computer generated invoice. No signature required.', pageWidth / 2, y, { align: 'center' });
                    
                    const fileName = `Invoice_KCP_${orderIdFormatted}_${new Date().getTime()}.pdf`;
                    doc.save(fileName);
                } else {
                    alert('Unable to load order details');
                }
            } catch (error) {
                console.error('Error downloading receipt:', error);
                alert('Error downloading receipt: ' + error.message);
            }
        }

        function logoutUser(event) {
            if (event) event.preventDefault();
            localStorage.removeItem('userId');
            localStorage.removeItem('userName');
            window.location.href = 'home.html';
        }

        function showToast(message) {
            // Create toast element if it doesn't exist
            let toast = document.getElementById('toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast';
                toast.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#333;color:white;padding:16px 24px;border-radius:8px;z-index:9999;animation:slideInUp 0.3s ease-out;';
                document.body.appendChild(toast);
            }
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
    </script>
