<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Sign Up - KCP Organics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-image: url("bg_img.webp");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            padding-top: 85px;
            padding-bottom: 20px;
        }

        /* Back Button fixed below navbar */
        .back-btn {
            position: fixed;
            top: 100px; /* just below navbar */
            left: 20px;
            padding: 10px 16px;
            background-color: #a8e063;
            color: #2e7d32;
            font-weight: 600;
            border: none;
            border-radius: 20px;
            text-decoration: none;
            cursor: pointer;
            transition: 0.3s;
            z-index: 999;
            min-height: 44px;
            font-size: 14px;
        }

        .back-btn:hover {
            background-color: #56ab2f;
            color: white;
            transform: translateY(-2px);
        }

        /* Signup Box */
        .signup-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 120px);
            padding: 20px;
        }

        .signup-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 22px;
            padding: 30px 25px;
            width: 100%;
            max-width: 340px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .signup-container h1 {
            color: #2e7d32;
            margin-bottom: 18px;
            font-size: 24px;
        }

        .signup-container label {
            display: block;
            text-align: left;
            margin: 8px 0 4px;
            font-weight: 600;
            color: #2e7d32;
            font-size: 13px;
        }

        .signup-container input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 12px;
            border: 1px solid #c8e6c9;
            border-radius: 22px;
            font-size: 16px;
            background: #f1f8e9;
            outline: none;
            min-height: 44px;
            box-sizing: border-box;
        }

        .signup-container input:focus {
            border-color: #66bb6a;
            box-shadow: 0 0 0 3px rgba(102, 187, 106, 0.2);
        }

        .role-options {
            display: flex;
            gap: 20px;
            margin: 6px 0 15px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .role-options div {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #2e7d32;
            font-weight: 600;
        }

        .role-options input {
            cursor: pointer;
            min-width: 18px;
            min-height: 18px;
        }

        .signup-container button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 22px;
            background-color: #2e7d32;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            min-height: 48px;
        }

        .signup-container button:hover {
            background-color: #1b5e20;
        }

        .login-link {
            margin-top: 14px;
            font-size: 13px;
            color: #2e7d32;
        }

        .login-link a {
            color: #2e7d32;
            font-weight: 600;
            text-decoration: none;
        }

        #message {
            margin-bottom: 12px;
            font-weight: 600;
            font-size: 13px;
        }

        /* Mobile */
        @media (max-width: 600px) {
            body {
                padding-top: 64px;
            }

            .back-btn {
                top: 75px;
                left: 10px;
                padding: 8px 12px;
                font-size: 13px;
            }

            .signup-wrapper {
                min-height: auto;
                padding: 15px 10px;
            }

            .signup-container {
                padding: 25px 20px;
                border-radius: 18px;
            }

            .signup-container h1 {
                font-size: 22px;
                margin-bottom: 16px;
            }

            .signup-container label {
                font-size: 12px;
                margin: 6px 0 3px;
            }

            .signup-container input {
                padding: 11px 12px;
                margin-bottom: 10px;
                font-size: 16px;
            }

            .role-options {
                gap: 15px;
                margin: 5px 0 12px;
            }

            .role-options div {
                font-size: 12px;
                gap: 4px;
            }

            .signup-container button {
                padding: 11px;
                font-size: 15px;
            }

            .login-link {
                font-size: 12px;
                margin-top: 12px;
            }

            .section1,
            .section2 {
                gap: 20px;
            }
        }

        @media (max-width: 480px) {
            .signup-wrapper {
                padding: 10px;
            }

            .signup-container {
                padding: 20px 15px;
            }

            .signup-container h1 {
                font-size: 20px;
            }

            .signup-container input,
            .signup-container button {
                font-size: 16px;
            }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">
            <a href="home.html"><img src="logo_final.png" alt="logo"></a>
        </div>
        <div class="section1">
            <a href="home.html">Home</a>
            <a href="about-us.html">About us</a>
            <a href="products.html">Products</a>
            <a href="contact.html">Contact us</a>
            <a href="admin-dashboard.html">Admin</a>
            <a href="track-order.html">Track Order</a>
        </div>
        <div class="section2" id="authSection">
            <div class="navbar-cart" onclick="toggleCart()">
                <i class="fas fa-shopping-cart"></i>
                <span id="cartBadge">0</span>
            </div>
            <a href="login.html" id="loginLink">Login</a>
            <a href="signup.html" id="signupLink" class="active">Sign up</a>
            <span id="userName" style="display: none;"></span>
            <a href="#" id="logoutLink" style="display: none;" onclick="logoutUser()">Logout</a>
        </div>
        <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
            <span class="hamburger"></span>
        </button>
    </nav>

    <!-- Mobile Menu -->
    <div class="mobile-menu"></div>

    <!-- Back Button -->
    <a href="home.html" class="back-btn">← Back to Home</a>

    <!-- Signup Box -->
    <div class="signup-wrapper">
        <div class="signup-container">
            <h1>Create Your Account</h1>
            <div id="message"></div>

            <form id="signupForm">
                <label>Full Name</label>
                <input type="text" name="name" required>

                <label>Email</label>
                <input type="email" name="email" required>

                <label>Mobile</label>
                <input type="number" name="number" required>

                <label>Password</label>
            <input type="password" name="password" required>

            <label>Select Role</label>
            <div class="role-options">
                <div>
                    <input type="radio" name="role" value="farmer" required>
                    Farmer
                </div>
                <div>
                    <input type="radio" name="role" value="citizen">
                    Citizen
                </div>
            </div>

            <button type="submit">Sign Up</button>

            <div class="login-link">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('signupForm');
        const messageDiv = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                name: form.name.value,
                email: form.email.value,
                number: form.number.value,
                password: form.password.value,
                role: form.role.value
            };

            try {
                const response = await fetch('https://kcp-organics-1.onrender.com/user/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (response.ok) {
                    messageDiv.innerText = data.message + ' Redirecting...';
                    messageDiv.style.color = 'green';
                    // Store user info and token, then redirect
                    if (data.data) {
                        localStorage.setItem('userName', data.data.name);
                        // server returns `id` field — use it if available, otherwise fallback to _id
                        localStorage.setItem('userId', data.data.id || data.data._id || 'guest');
                        localStorage.setItem('userRole', data.data.role);
                        try { if (typeof migrateGuestCartToUser === 'function') migrateGuestCartToUser(); } catch(e) {}
                    }
                    if (data.token) {
                        localStorage.setItem('token', data.token);
                    }
                    form.reset();
                    setTimeout(() => {
                        window.location.href = 'home.html';
                    }, 1500);
                } else {
                    messageDiv.innerText = data.message || 'Signup failed';
                    messageDiv.style.color = 'red';
                }
            } catch {
                messageDiv.innerText = 'Server error';
                messageDiv.style.color = 'red';
            }
        });
    </script>
    <script>
        function toggleCart() { window.location.href = 'cart.html'; }
        function logoutUser() {
            localStorage.removeItem('userName'); localStorage.removeItem('userId');
            localStorage.removeItem('userEmail'); localStorage.removeItem('userRole');
            window.location.href = 'home.html';
        }
        function checkUserSession() {
            var n = localStorage.getItem('userName');
            if (n) {
                document.getElementById('loginLink').style.display = 'none';
                document.getElementById('signupLink').style.display = 'none';
                document.getElementById('userName').style.display = 'inline';
                document.getElementById('userName').textContent = 'Welcome, ' + n;
                document.getElementById('logoutLink').style.display = 'inline';
            }
        }
        document.addEventListener('DOMContentLoaded', function() {
            checkUserSession();
            var cart = JSON.parse(localStorage.getItem('cart') || '[]');
            document.getElementById('cartBadge').textContent = cart.reduce(function(s, i) { return s + (i.quantity || 0); }, 0);
        });
    </script>
    <script src="site.js"></script>
</body>
</html>
